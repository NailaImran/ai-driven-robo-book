<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    ROS 2 Node Graph: Topics and Services
  </text>

  <!-- Legend -->
  <g>
    <circle cx="50" cy="60" r="8" fill="#1976d2" stroke="#333" stroke-width="1"/>
    <text x="70" y="65" font-size="10" fill="#333">Publisher/Node</text>

    <rect x="230" y="52" width="16" height="16" fill="#fff" stroke="#f57c00" stroke-width="2"/>
    <text x="260" y="65" font-size="10" fill="#333">Topic</text>

    <path d="M 420,60 L 430,55 L 430,65 Z" fill="#4caf50" stroke="none"/>
    <text x="445" y="65" font-size="10" fill="#333">Message Flow</text>

    <line x1="650" y1="60" x2="680" y2="60" stroke="#f57c00" stroke-width="2"/>
    <text x="700" y="65" font-size="10" fill="#333">Service Link</text>
  </g>

  <!-- Camera Driver Node -->
  <g>
    <circle cx="100" cy="150" r="25" fill="#1976d2" stroke="#333" stroke-width="2"/>
    <text x="100" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Camera</text>
    <text x="100" y="160" font-size="9" text-anchor="middle" fill="white">Driver</text>
  </g>

  <!-- /camera/image_raw topic -->
  <rect x="220" y="140" width="100" height="20" fill="#fff" stroke="#f57c00" stroke-width="2" rx="3"/>
  <text x="270" y="154" font-size="9" text-anchor="middle" fill="#333">/camera/image_raw</text>

  <!-- Arrow from Camera to Topic -->
  <path d="M 125,150 L 220,150" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Object Detector Node -->
  <g>
    <circle cx="400" cy="120" r="25" fill="#1976d2" stroke="#333" stroke-width="2"/>
    <text x="400" y="115" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Object</text>
    <text x="400" y="130" font-size="9" text-anchor="middle" fill="white">Detector</text>
  </g>

  <!-- Arrow from Topic to Detector -->
  <path d="M 320,150 L 375,140" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- /detections topic -->
  <rect x="520" y="100" width="100" height="20" fill="#fff" stroke="#f57c00" stroke-width="2" rx="3"/>
  <text x="570" y="114" font-size="9" text-anchor="middle" fill="#333">/detections</text>

  <!-- Arrow from Detector to Detections topic -->
  <path d="M 425,115 L 520,115" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Motion Planner Node -->
  <g>
    <circle cx="700" cy="150" r="25" fill="#1976d2" stroke="#333" stroke-width="2"/>
    <text x="700" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Motion</text>
    <text x="700" y="160" font-size="9" text-anchor="middle" fill="white">Planner</text>
  </g>

  <!-- Arrow from Detections to Planner -->
  <path d="M 620,115 L 675,140" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- /trajectory topic -->
  <rect x="220" y="220" width="100" height="20" fill="#fff" stroke="#f57c00" stroke-width="2" rx="3"/>
  <text x="270" y="234" font-size="9" text-anchor="middle" fill="#333">/trajectory</text>

  <!-- Arrow from Planner to Trajectory topic -->
  <path d="M 680,170 L 320,230" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Arm Controller Node -->
  <g>
    <circle cx="100" cy="280" r="25" fill="#1976d2" stroke="#333" stroke-width="2"/>
    <text x="100" y="275" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Arm</text>
    <text x="100" y="290" font-size="9" text-anchor="middle" fill="white">Controller</text>
  </g>

  <!-- Arrow from Trajectory to Arm -->
  <path d="M 220,230 L 125,270" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- /joint_commands topic (from Arm back to hardware) -->
  <rect x="220" y="340" width="110" height="20" fill="#fff" stroke="#f57c00" stroke-width="2" rx="3"/>
  <text x="275" y="354" font-size="9" text-anchor="middle" fill="#333">/joint_commands</text>

  <!-- Arrow from Arm to Commands -->
  <path d="M 125,300 L 270,340" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- IMU Sensor Node -->
  <g>
    <circle cx="100" cy="420" r="25" fill="#1976d2" stroke="#333" stroke-width="2"/>
    <text x="100" y="415" font-size="10" font-weight="bold" text-anchor="middle" fill="white">IMU</text>
    <text x="100" y="430" font-size="9" text-anchor="middle" fill="white">Sensor</text>
  </g>

  <!-- /imu/data topic -->
  <rect x="220" y="410" width="80" height="20" fill="#fff" stroke="#f57c00" stroke-width="2" rx="3"/>
  <text x="260" y="424" font-size="9" text-anchor="middle" fill="#333">/imu/data</text>

  <!-- Arrow from IMU to Topic -->
  <path d="M 125,420 L 220,420" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Logger/Monitor Node -->
  <g>
    <circle cx="700" cy="400" r="25" fill="#1976d2" stroke="#333" stroke-width="2"/>
    <text x="700" y="395" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Logger</text>
    <text x="700" y="410" font-size="9" text-anchor="middle" fill="white">Monitor</text>
  </g>

  <!-- Logger subscribes to multiple topics -->
  <path d="M 620,420 L 300,420" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>
  <path d="M 680,380 L 320,230" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>
  <path d="M 680,380 L 320,115" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Service Call (Arm Controller get_state service) -->
  <g>
    <line x1="400" y1="420" x2="470" y2="420" stroke="#f57c00" stroke-width="2"/>
    <circle cx="470" cy="420" r="6" fill="white" stroke="#f57c00" stroke-width="2"/>
  </g>
  <text x="430" y="410" font-size="9" fill="#f57c00" font-weight="bold">/get_arm_state</text>
  <text x="430" y="435" font-size="8" fill="#666">(Service Call)</text>

  <!-- Statistics Box -->
  <g>
    <rect x="50" y="490" width="900" height="90" fill="#F5F5F5" stroke="#ccc" stroke-width="1" rx="5"/>

    <text x="70" y="510" font-size="12" font-weight="bold" fill="#333">Key Concepts:</text>

    <text x="70" y="530" font-size="10" fill="#333">
      <tspan font-weight="bold">Topics (Many-to-Many):</tspan> Used for continuous data streams (sensor data, trajectories)
    </text>

    <text x="70" y="548" font-size="10" fill="#333">
      <tspan font-weight="bold">Services (Request-Response):</tspan> Used for discrete requests that need responses (get state, set parameters)
    </text>

    <text x="70" y="566" font-size="10" fill="#333">
      <tspan font-weight="bold">Decoupling:</tspan> Nodes don't need to know about each other—they communicate through named topics and services
    </text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
  </defs>
</svg>
