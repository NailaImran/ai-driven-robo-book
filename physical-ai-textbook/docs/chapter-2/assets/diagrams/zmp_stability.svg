<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Zero Moment Point (ZMP) Stability Analysis
  </text>

  <!-- Scene 1: Stable (ZMP inside support polygon) -->
  <g>
    <text x="250" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
      STABLE: ZMP Inside Support Polygon
    </text>

    <!-- Ground -->
    <rect x="100" y="280" width="300" height="10" fill="#8B7355" stroke="#333" stroke-width="2"/>

    <!-- Left foot -->
    <rect x="120" y="280" width="40" height="8" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="140" cy="289" r="3" fill="#333"/>

    <!-- Right foot -->
    <rect x="260" y="280" width="40" height="8" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="280" cy="289" r="3" fill="#333"/>

    <!-- Support polygon -->
    <polygon points="120,280 160,280 300,280 300,288 160,288 120,288" fill="#E8F5E9" opacity="0.5" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>

    <!-- Body/CoM -->
    <circle cx="190" cy="150" r="20" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <text x="190" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CoM</text>

    <!-- Vertical line from CoM -->
    <line x1="190" y1="170" x2="190" y2="280" stroke="#2196F3" stroke-width="2" stroke-dasharray="3,3"/>

    <!-- ZMP point -->
    <circle cx="190" cy="280" r="8" fill="#FF5722" stroke="#333" stroke-width="2"/>
    <text x="190" y="285" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Z</text>

    <!-- Annotations -->
    <text x="250" y="320" font-size="11" fill="#333">✓ Stable condition</text>
    <text x="250" y="335" font-size="11" fill="#333">✓ ZMP within support base</text>
    <text x="250" y="350" font-size="11" fill="#333">✓ No tipping moment</text>

    <!-- Distance arrows -->
    <line x1="140" y1="295" x2="190" y2="295" stroke="#FF5722" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="190" y1="295" x2="280" y2="295" stroke="#FF5722" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="165" y="310" font-size="9" fill="#666">Margin</text>
    <text x="230" y="310" font-size="9" fill="#666">Margin</text>
  </g>

  <!-- Scene 2: Unstable (ZMP outside support polygon) -->
  <g>
    <text x="750" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
      UNSTABLE: ZMP Outside Support Polygon
    </text>

    <!-- Ground -->
    <rect x="600" y="280" width="300" height="10" fill="#8B7355" stroke="#333" stroke-width="2"/>

    <!-- Left foot -->
    <rect x="620" y="280" width="40" height="8" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="640" cy="289" r="3" fill="#333"/>

    <!-- Right foot -->
    <rect x="760" y="280" width="40" height="8" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="780" cy="289" r="3" fill="#333"/>

    <!-- Support polygon -->
    <polygon points="620,280 660,280 800,280 800,288 660,288 620,288" fill="#FFEBEE" opacity="0.5" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>

    <!-- Body/CoM (leaning forward) -->
    <circle cx="750" cy="120" r="20" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <text x="750" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CoM</text>

    <!-- Vertical line from CoM -->
    <line x1="750" y1="140" x2="750" y2="280" stroke="#2196F3" stroke-width="2" stroke-dasharray="3,3"/>

    <!-- ZMP point (outside polygon) -->
    <circle cx="750" cy="280" r="8" fill="#FF5722" stroke="#333" stroke-width="2"/>
    <text x="750" y="285" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Z</text>

    <!-- Error zone -->
    <path d="M 660 275 L 750 275 L 750 295 L 660 295 Z" fill="#FFCDD2" opacity="0.7" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Annotations -->
    <text x="800" y="320" font-size="11" fill="#333">✗ Unstable condition</text>
    <text x="800" y="335" font-size="11" fill="#333">✗ ZMP outside base</text>
    <text x="800" y="350" font-size="11" fill="#333">✗ Tipping moment exists</text>

    <!-- Distance arrow showing instability -->
    <line x1="800" y1="295" x2="750" y2="295" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="765" y="310" font-size="9" fill="#ef4444" font-weight="bold">FALLING</text>
  </g>

  <!-- Bottom explanation -->
  <g>
    <rect x="50" y="380" width="900" height="100" fill="#F5F5F5" stroke="#ccc" stroke-width="1" rx="5"/>

    <text x="70" y="405" font-size="12" font-weight="bold" fill="#333">ZMP Definition:</text>
    <text x="70" y="425" font-size="11" fill="#333">
      The Zero Moment Point is the point on the ground where the total moment of forces (excluding friction) equals zero.
    </text>
    <text x="70" y="445" font-size="11" fill="#333">
      For stability: ZMP must remain within the support polygon (area between feet).
    </text>
    <text x="70" y="465" font-size="11" fill="#333">
      Formula: ZMP_x = CoM_x - (accel_x / g) × CoM_height
    </text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
