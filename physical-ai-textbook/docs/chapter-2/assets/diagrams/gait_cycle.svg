<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Bipedal Gait Cycle Phases
  </text>

  <!-- Phase 1: Left Stance, Right Swing (0-50%) -->
  <g>
    <text x="150" y="80" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">
      Phase 1: 0-50%
    </text>
    <text x="150" y="95" font-size="11" text-anchor="middle" fill="#666">
      Left Stance, Right Swing
    </text>

    <!-- Ground -->
    <line x1="50" y1="250" x2="250" y2="250" stroke="#8B7355" stroke-width="3"/>

    <!-- Left foot on ground (stance) -->
    <ellipse cx="80" cy="250" rx="15" ry="4" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <text x="80" y="270" font-size="10" text-anchor="middle" fill="#333">Left (Stance)</text>

    <!-- Right foot in air (swing) -->
    <ellipse cx="140" cy="140" rx="15" ry="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <text x="140" y="120" font-size="10" text-anchor="middle" fill="#333">Right (Swing)</text>

    <!-- Leg line (left) -->
    <line x1="80" y1="250" x2="100" y2="160" stroke="#4CAF50" stroke-width="3"/>

    <!-- Leg line (right) -->
    <path d="M 140 140 Q 120 180 100 200" stroke="#2196F3" stroke-width="3" fill="none" stroke-dasharray="3,3"/>

    <!-- CoM -->
    <circle cx="110" cy="160" r="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <text x="110" y="165" font-size="9" font-weight="bold" text-anchor="middle" fill="white">CoM</text>

    <!-- Ground contact indicator -->
    <rect x="70" y="260" width="30" height="4" fill="#10b981" stroke="none"/>
  </g>

  <!-- Phase 2: Double Support Transition (45-55%) -->
  <g>
    <text x="450" y="80" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">
      Phase 2: 45-55%
    </text>
    <text x="450" y="95" font-size="11" text-anchor="middle" fill="#666">
      Double Support (Both feet)
    </text>

    <!-- Ground -->
    <line x1="350" y1="250" x2="550" y2="250" stroke="#8B7355" stroke-width="3"/>

    <!-- Left foot on ground -->
    <ellipse cx="380" cy="250" rx="15" ry="4" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <text x="380" y="270" font-size="10" text-anchor="middle" fill="#333">Left</text>

    <!-- Right foot landing -->
    <ellipse cx="460" cy="250" rx="15" ry="4" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <text x="460" y="270" font-size="10" text-anchor="middle" fill="#333">Right</text>

    <!-- Leg lines -->
    <line x1="380" y1="250" x2="400" y2="160" stroke="#4CAF50" stroke-width="3"/>
    <line x1="460" y1="250" x2="440" y2="160" stroke="#2196F3" stroke-width="3"/>

    <!-- CoM -->
    <circle cx="420" cy="160" r="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <text x="420" y="165" font-size="9" font-weight="bold" text-anchor="middle" fill="white">CoM</text>

    <!-- Ground contact indicators -->
    <rect x="370" y="260" width="30" height="4" fill="#10b981" stroke="none"/>
    <rect x="450" y="260" width="30" height="4" fill="#10b981" stroke="none"/>
  </g>

  <!-- Phase 3: Right Stance, Left Swing (50-100%) -->
  <g>
    <text x="750" y="80" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">
      Phase 3: 50-100%
    </text>
    <text x="750" y="95" font-size="11" text-anchor="middle" fill="#666">
      Right Stance, Left Swing
    </text>

    <!-- Ground -->
    <line x1="650" y1="250" x2="850" y2="250" stroke="#8B7355" stroke-width="3"/>

    <!-- Right foot on ground (stance) -->
    <ellipse cx="720" cy="250" rx="15" ry="4" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <text x="720" y="270" font-size="10" text-anchor="middle" fill="#333">Right (Stance)</text>

    <!-- Left foot in air (swing) -->
    <ellipse cx="780" cy="140" rx="15" ry="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <text x="780" y="120" font-size="10" text-anchor="middle" fill="#333">Left (Swing)</text>

    <!-- Leg line (right) -->
    <line x1="720" y1="250" x2="740" y2="160" stroke="#2196F3" stroke-width="3"/>

    <!-- Leg line (left) -->
    <path d="M 780 140 Q 760 180 740 200" stroke="#4CAF50" stroke-width="3" fill="none" stroke-dasharray="3,3"/>

    <!-- CoM -->
    <circle cx="750" cy="160" r="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <text x="750" y="165" font-size="9" font-weight="bold" text-anchor="middle" fill="white">CoM</text>

    <!-- Ground contact indicator -->
    <rect x="710" y="260" width="30" height="4" fill="#10b981" stroke="none"/>
  </g>

  <!-- Timeline -->
  <g>
    <text x="50" y="370" font-size="12" font-weight="bold" fill="#333">Cycle Timeline:</text>

    <!-- Timeline bar -->
    <rect x="50" y="395" width="1100" height="15" fill="white" stroke="#333" stroke-width="2" rx="3"/>

    <!-- Phase markers -->
    <line x1="50" y1="380" x2="50" y2="415" stroke="#333" stroke-width="1"/>
    <text x="50" y="375" font-size="9" text-anchor="middle" fill="#333">0%</text>

    <line x1="300" y1="380" x2="300" y2="415" stroke="#333" stroke-width="1"/>
    <text x="300" y="375" font-size="9" text-anchor="middle" fill="#333">25%</text>

    <line x1="550" y1="380" x2="550" y2="415" stroke="#333" stroke-width="1"/>
    <text x="550" y="375" font-size="9" text-anchor="middle" fill="#333">50%</text>

    <line x1="800" y1="380" x2="800" y2="415" stroke="#333" stroke-width="1"/>
    <text x="800" y="375" font-size="9" text-anchor="middle" fill="#333">75%</text>

    <line x1="1050" y1="380" x2="1050" y2="415" stroke="#333" stroke-width="1"/>
    <text x="1050" y="375" font-size="9" text-anchor="middle" fill="#333">100%</text>

    <!-- Phase regions -->
    <rect x="50" y="395" width="500" height="15" fill="#E3F2FD" opacity="0.5" stroke="none"/>
    <text x="300" y="407" font-size="9" text-anchor="middle" fill="#1976d2" font-weight="bold">Right Swing Phase</text>

    <rect x="550" y="395" width="500" height="15" fill="#F3E5F5" opacity="0.5" stroke="none"/>
    <text x="800" y="407" font-size="9" text-anchor="middle" fill="#7b1fa2" font-weight="bold">Left Swing Phase</text>
  </g>

  <!-- Bottom info -->
  <g>
    <rect x="50" y="450" width="1100" height="40" fill="#F5F5F5" stroke="#ccc" stroke-width="1" rx="3"/>
    <text x="70" y="470" font-size="11" fill="#333">
      <tspan font-weight="bold">Key Points:</tspan> One complete cycle = full stride. Each leg is in stance ~60% of cycle, swing ~40%.
    </text>
    <text x="70" y="485" font-size="11" fill="#333">
      Double support phase ensures stability when transitioning between legs.
    </text>
  </g>

  <!-- Legend -->
  <g>
    <ellipse cx="915" cy="250" rx="10" ry="3" fill="#4CAF50" stroke="#333" stroke-width="1"/>
    <text x="945" y="255" font-size="10" fill="#333">Left Foot</text>

    <ellipse cx="915" cy="275" rx="10" ry="3" fill="#2196F3" stroke="#333" stroke-width="1"/>
    <text x="945" y="280" font-size="10" fill="#333">Right Foot</text>

    <circle cx="915" cy="300" r="8" fill="#FF9800" stroke="#333" stroke-width="1"/>
    <text x="945" y="305" font-size="10" fill="#333">Center of Mass</text>
  </g>
</svg>
