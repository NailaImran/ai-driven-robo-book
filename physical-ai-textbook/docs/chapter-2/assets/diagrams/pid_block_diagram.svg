<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    PID Control Block Diagram
  </text>

  <!-- Input (Setpoint) -->
  <rect x="30" y="120" width="80" height="50" fill="#4CAF50" stroke="#333" stroke-width="2" rx="5"/>
  <text x="70" y="150" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    Setpoint
  </text>
  <text x="70" y="165" font-size="10" text-anchor="middle" fill="white">r(t)</text>

  <!-- Sum node -->
  <circle cx="140" cy="145" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="140" y="150" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Σ</text>

  <!-- Error signal -->
  <line x1="110" y1="145" x2="120" y2="145" stroke="#333" stroke-width="2"/>
  <line x1="140" y1="125" x2="140" y2="100" stroke="#333" stroke-width="2"/>
  <text x="150" y="110" font-size="11" fill="#333">e(t) = r(t) - y(t)</text>

  <!-- Arrow to control block -->
  <line x1="160" y1="145" x2="200" y2="145" stroke="#333" stroke-width="2"/>
  <polygon points="200,145 190,140 190,150" fill="#333"/>

  <!-- PID Control Block -->
  <rect x="200" y="100" width="120" height="90" fill="#2196F3" stroke="#333" stroke-width="2" rx="5"/>
  <text x="260" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    PID Controller
  </text>
  <text x="260" y="142" font-size="10" text-anchor="middle" fill="white">
    Kp·e + Ki·∫e + Kd·de/dt
  </text>
  <text x="260" y="160" font-size="10" text-anchor="middle" fill="white">
    u(t)
  </text>

  <!-- Arrow to system -->
  <line x1="320" y1="145" x2="360" y2="145" stroke="#333" stroke-width="2"/>
  <polygon points="360,145 350,140 350,150" fill="#333"/>

  <!-- System/Plant -->
  <rect x="360" y="100" width="120" height="90" fill="#FF9800" stroke="#333" stroke-width="2" rx="5"/>
  <text x="420" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    System/Plant
  </text>
  <text x="420" y="145" font-size="10" text-anchor="middle" fill="white">
    Motor, Robot
  </text>
  <text x="420" y="165" font-size="10" text-anchor="middle" fill="white">
    y(t)
  </text>

  <!-- Output feedback loop -->
  <line x1="480" y1="145" x2="540" y2="145" stroke="#333" stroke-width="2"/>
  <polygon points="540,145 530,140 530,150" fill="#333"/>

  <!-- Output label -->
  <text x="510" y="135" font-size="11" fill="#333" font-weight="bold">Output</text>

  <!-- Feedback path -->
  <line x1="540" y1="150" x2="540" y2="240" stroke="#333" stroke-width="2"/>
  <line x1="540" y1="240" x2="140" y2="240" stroke="#333" stroke-width="2"/>
  <line x1="140" y1="240" x2="140" y2="165" stroke="#333" stroke-width="2"/>
  <polygon points="140,165 135,175 145,175" fill="#333"/>

  <!-- Sensor -->
  <rect x="500" y="240" width="80" height="50" fill="#9C27B0" stroke="#333" stroke-width="2" rx="5"/>
  <text x="540" y="265" font-size="11" font-weight="bold" text-anchor="middle" fill="white">
    Sensor
  </text>
  <text x="540" y="280" font-size="10" text-anchor="middle" fill="white">
    Feedback
  </text>

  <!-- P Term explanation -->
  <rect x="30" y="320" width="160" height="60" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="3"/>
  <text x="40" y="337" font-size="11" font-weight="bold" fill="#333">P (Proportional)</text>
  <text x="40" y="352" font-size="10" fill="#333">Kp·e(t)</text>
  <text x="40" y="367" font-size="9" fill="#666">Fast response</text>

  <!-- I Term explanation -->
  <rect x="230" y="320" width="160" height="60" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="3"/>
  <text x="240" y="337" font-size="11" font-weight="bold" fill="#333">I (Integral)</text>
  <text x="240" y="352" font-size="10" fill="#333">Ki·∫e(t)dt</text>
  <text x="240" y="367" font-size="9" fill="#666">Eliminate error</text>

  <!-- D Term explanation -->
  <rect x="430" y="320" width="160" height="60" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="3"/>
  <text x="440" y="337" font-size="11" font-weight="bold" fill="#333">D (Derivative)</text>
  <text x="440" y="352" font-size="10" fill="#333">Kd·de/dt</text>
  <text x="440" y="367" font-size="9" fill="#666">Reduce overshoot</text>

  <!-- Legend -->
  <text x="700" y="340" font-size="12" font-weight="bold" fill="#333">Control Flow:</text>
  <line x1="700" y1="350" x2="750" y2="350" stroke="#333" stroke-width="2"/>
  <polygon points="750,350 740,345 740,355" fill="#333"/>
  <text x="760" y="355" font-size="10" fill="#333">Signal flow</text>
</svg>
